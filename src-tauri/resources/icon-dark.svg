<svg xmlns="http://www.w3.org/2000/svg" viewBox="-100 -100 1200 1200" style="color: white">
    <defs>
        <filter id="a" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="20" />
            <feOffset dx="10" dy="20" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope=".4" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    <circle cx="500" cy="500" r="420" fill="none" stroke="currentColor" stroke-width="100" filter="url(#a)" />
    <rect x="250" y="325" width="100" height="350" rx="50" ry="50" fill="currentColor" filter="url(#a)" />
    <rect x="450" y="200" width="100" height="600" rx="50" ry="50" fill="currentColor" filter="url(#a)" />
    <rect x="650" y="400" width="100" height="200" rx="50" ry="50" fill="currentColor" filter="url(#a)"/>
</svg>