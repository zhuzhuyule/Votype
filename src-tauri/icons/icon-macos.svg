<svg xmlns="http://www.w3.org/2000/svg" viewBox="-100 -100 1200 1200" style="color:#fff">
  <defs>
    <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="b" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="10" dy="20" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope=".4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1000" height="1000" rx="228" ry="228" fill="url(#a)" filter="url(#b)"/>
  <g transform="translate(500, 500) scale(0.920) translate(-500, -500)">
    <circle cx="500" cy="500" r="420" fill="none" stroke="currentColor" stroke-width="100" filter="url(#b)"/>
    <rect x="250" y="325" width="100" height="350" rx="50" ry="50" fill="currentColor" filter="url(#b)"/>
    <rect x="450" y="200" width="100" height="600" rx="50" ry="50" fill="currentColor" filter="url(#b)"/>
    <rect x="650" y="400" width="100" height="200" rx="50" ry="50" fill="currentColor" filter="url(#b)"/>
  </g>
</svg>
