<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Votype</title>
  </head>

  <body>
    <div id="root">
      <style>
        /* --- Design Tokens (Variables) --- */
        :root {
          /* Light Mode Colors */
          --bg-color: #f9fafb; /* zinc-50 */
          --text-primary: #18181b; /* zinc-900 */
          --text-secondary: #a1a1aa; /* zinc-400 */
          --ring-color: #e4e4e7; /* zinc-200 */
          --dot-color: #2563eb; /* blue-600 */
          --dot-shadow: rgba(37, 99, 235, 0.8);
          --bar-color: #27272a; /* zinc-800 */
          --shine-color: #ffffff; /* Pure white for the reflection */
          --cursor-color: #a1a1aa; /* zinc-400 */
        }

        @media (prefers-color-scheme: dark) {
          :root {
            /* Dark Mode Colors */
            --bg-color: #09090b; /* zinc-950 */
            /* Slightly dimmed base text so the white shine pops */
            --text-primary: #d4d4d8; /* zinc-300 */
            --text-secondary: #52525b; /* zinc-600 */
            --ring-color: #27272a; /* zinc-800 */
            --dot-color: #3b82f6; /* blue-500 */
            --bar-color: #e4e4e7; /* zinc-200 */
            --cursor-color: #71717a; /* zinc-500 */
          }
        }

        /* --- Global Reset & Layout --- */
        #app-loader {
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background-color: var(--bg-color);
          color: var(--text-primary);
          font-family:
            -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
            "Helvetica Neue", Arial, sans-serif;
          -webkit-font-smoothing: antialiased;
          user-select: none;
          overflow: hidden;
          z-index: 1000;
        }

        /* --- Component Styles --- */

        .container {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 2rem;
        }

        /* Wrapper for the Logo and its Duplicate Shine Layer */
        .logo-wrapper {
          position: relative;
          font-size: 3rem;
          font-weight: 900;
          letter-spacing: 0.1em;
          line-height: 1;
        }

        /* Common layout for both layers */
        .logo-layer {
          display: flex;
          align-items: center;
          justify-content: center;
        }

        /*
           Layer 1: The Base Content
           Uses the CSS variables defined in :root
        */
        .layer-base .char {
          color: var(--text-primary);
        }
        .layer-base .orbit-ring {
          border-color: var(--ring-color);
        }
        .layer-base .bar {
          background-color: var(--bar-color);
        }

        /*
           Layer 2: The Shine Content
           This sits exactly on top but is forced to be Pure White.
           We mask it so only a "wave" is visible.
        */
        .layer-shine {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
          z-index: 10;

          /* Force all children to be white/bright */
          color: var(--shine-color);

          /* The Mask: A gradient that moves across to reveal the white layer */
          -webkit-mask-image: linear-gradient(
            110deg,
            transparent 35%,
            #000 48%,
            #000 52%,
            transparent 65%
          );
          mask-image: linear-gradient(
            110deg,
            transparent 35%,
            #000 48%,
            #000 52%,
            transparent 65%
          );
          -webkit-mask-size: 150% 100%;
          mask-size: 150% 100%;
          -webkit-mask-repeat: no-repeat;
          mask-repeat: no-repeat;

          /*
             Shine Animation:
             Runs for 4.5s total (Scan + Wait).
             Delay 1.2s to wait for text to reveal initially.
          */
          opacity: 0;
          animation: shine-scan 3s ease-out infinite;
          animation-delay: 1.2s;
        }

        /* Overrides for the Shine Layer elements */
        .layer-shine .orbit-ring {
          border-color: var(--shine-color);
          opacity: 0.9;
        }
        .layer-shine .bar {
          background-color: var(--shine-color);
        }

        /* --- Animation Primitives --- */

        /* Char Reveal */
        .char {
          opacity: 0;
          animation: votype-reveal 0.6s ease-out forwards;
          position: relative;
          font-style: italic;
        }

        /* Icon Layout */
        .icon-o {
          position: relative;
          width: 3rem;
          height: 3rem;
          margin: 0 0.5rem;
          display: flex;
          align-items: center;
          justify-content: center;
          opacity: 0;
          /* Animation applied inline for delay */
          animation: votype-reveal 0.6s ease-out forwards;
        }

        /* 1. Orbit Ring */
        .orbit-ring {
          position: absolute;
          inset: 0;
          border: 3px solid;
          border-radius: 50%;
          box-sizing: border-box;
        }

        /* 3. Inner Voice Bars */
        .voice-bars {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 0.25rem;
          height: 1.5rem;
        }

        .bar {
          width: 0.375rem;
          height: 100%;
          border-radius: 9999px;
          transform-origin: center;
          animation: votype-bar 0.8s ease-in-out infinite;
        }

        .bar:nth-child(2) {
          animation-duration: 1.1s;
          animation-delay: 0.1s;
        }
        .bar:nth-child(3) {
          animation-duration: 0.9s;
          animation-delay: 0.2s;
        }

        /* Status Text - Typewriter Container */
        .status-text {
          font-size: 0.75rem;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.25em;
          color: var(--text-secondary);
          margin-top: 1rem;
          height: 1.2rem; /* Fixed height to prevent layout jumps */
          display: flex;
          align-items: center;
          justify-content: center;
          opacity: 0;
          animation: status-fade 0.45s ease-out 0.1s both;
          will-change: transform, opacity;
        }

        /* --- Keyframes --- */

        @keyframes votype-reveal {
          0% {
            opacity: 0;
            transform: translateY(20px);
          }
          100% {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes votype-spin {
          from {
            transform: rotate(0deg);
          }
          to {
            transform: rotate(360deg);
          }
        }

        @keyframes votype-bar {
          0%,
          100% {
            transform: scaleY(0.4);
            opacity: 0.5;
          }
          50% {
            transform: scaleY(1);
            opacity: 1;
          }
        }

        @keyframes blink {
          0%,
          100% {
            opacity: 1;
          }
          50% {
            opacity: 0;
          }
        }

        @keyframes status-fade {
          from {
            opacity: 0;
            transform: translate3d(0, 8px, 0);
          }
          to {
            opacity: 1;
            transform: translate3d(0, 0, 0);
          }
        }

        /* The Light Scan Animation: Left to Right */
        @keyframes shine-scan {
          0% {
            -webkit-mask-position: 150% 0;
            mask-position: 150% 0;
            opacity: 1;
          }
          35% {
            /* Move across */
            -webkit-mask-position: -150% 0;
            mask-position: -150% 0;
            opacity: 1;
          }
          35.1% {
            /* Hide immediately after passing */
            opacity: 0;
          }
          100% {
            /* Wait hidden */
            -webkit-mask-position: -150% 0;
            mask-position: -150% 0;
            opacity: 0;
          }
        }
      </style>
      <div id="app-loader">
        <div class="container">
          <div class="logo-wrapper">
            <!-- LAYER 1: BASE (Normal Colors) -->
            <div class="logo-layer layer-base">
              <!-- Staggered delays: 200ms interval -->

              <!-- V: 0ms -->
              <span class="char" style="animation-delay: 0ms">V</span>

              <!-- O (Icon): 200ms -->
              <div class="icon-o" style="animation-delay: 100ms">
                <div class="orbit-ring"></div>
                <div class="voice-bars">
                  <div class="bar"></div>
                  <div class="bar"></div>
                  <div class="bar"></div>
                </div>
              </div>

              <!-- T: 400ms -->
              <span class="char" style="animation-delay: 200ms">T</span>
              <!-- Y: 600ms -->
              <span class="char" style="animation-delay: 300ms">Y</span>
              <!-- P: 800ms -->
              <span class="char" style="animation-delay: 400ms">P</span>
              <!-- E: 1000ms -->
              <span class="char" style="animation-delay: 500ms">E</span>
            </div>

            <!-- LAYER 2: SHINE (Pure White, Masked) -->
            <!-- Same delays to ensure text positions match perfectly during reveal -->
            <div class="logo-layer layer-shine" aria-hidden="true">
              <span class="char" style="animation-delay: 200ms">V</span>

              <div class="icon-o" style="animation-delay: 300ms">
                <div class="orbit-ring"></div>
                <div class="voice-bars">
                  <div class="bar"></div>
                  <div class="bar"></div>
                  <div class="bar"></div>
                </div>
              </div>

              <span class="char" style="animation-delay: 400ms">T</span>
              <span class="char" style="animation-delay: 500ms">Y</span>
              <span class="char" style="animation-delay: 600ms">P</span>
              <span class="char" style="animation-delay: 700ms">E</span>
            </div>
          </div>

          <!-- Typewriter Status Text -->
          <div class="status-text">INITIALIZING VOTYPE SPEECH ENGINE...</div>
        </div>
      </div>
    </div>

    <script type="module">
      setTimeout(() => import("/src/main.tsx"), 500);
    </script>
  </body>
</html>
